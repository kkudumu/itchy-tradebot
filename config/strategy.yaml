# Core strategy parameters for the XAU/USD Ichimoku system

active_strategy: ichimoku

strategies:
  ichimoku:
    ichimoku:
      tenkan_period: 9
      kijun_period: 26
      senkou_b_period: 52

    adx:
      period: 14
      threshold: 20  # Standard trending threshold — 28 was filtering out too many valid gold trends

    atr:
      period: 14
      stop_multiplier: 2.5  # Initial stop = 2.5 × ATR beyond entry (widened: 1.5x too tight for gold volatility)

    signal:
      min_confluence_score: 1
      tier_a_plus: 7   # All major factors aligned — full risk allocation
      tier_b: 5        # Strong signal — 75% risk allocation
      tier_c: 1        # Minimum viable signal — 50% risk allocation
      timeframes:
        - "15M"
        - "5M"

  asian_breakout:
    enabled: true
    weight: 1.0
    asian_session_start_utc: "21:00"
    asian_session_end_utc: "06:00"
    london_entry_start_utc: "06:00"
    london_entry_end_utc: "20:00"
    min_range_pips: 3
    max_range_pips: 80
    rr_ratio: 2.0
    atr_period: 14

  ema_pullback:
    enabled: true
    weight: 1.0
    fast_ema: 8
    mid_ema: 18
    slow_ema: 50
    atr_period: 14
    min_ema_angle_deg: 2
    max_ema_angle_deg: 95
    pullback_candles_min: 1
    pullback_candles_max: 20
    breakout_window_bars: 20
    rr_ratio: 2.0

  fx_at_one_glance:
    tf_mode: intraday            # swing|intraday|hybrid|scalp|hyperscalp_*
    ichimoku:
      tenkan_period: 9
      kijun_period: 26
      senkou_b_period: 52
    adx:
      period: 14
      threshold: 20
    atr:
      period: 14
      stop_multiplier: 2.5
    cloud_balance:
      enabled: true
    kihon_suchi:
      enabled: true
      tolerance: 1
    wave:
      elliott_enabled: true
    divergence:
      enabled: true
      oscillator: rsi
    five_elements_mode: hard_gate
    time_theory_mode: soft_filter
    range_filter:
      adx_min: 20
      cloud_thickness_min_usd: 0.50
    signal:
      min_confluence_score: 6
      min_tier: B
    exit:
      mode: hybrid
      partial_close_pct: 50
      primary_target: n_value
      trail_with: fractal_kijun
      no_be_before_r: 1.0
      use_heikin_ashi: true
    stop_loss:
      preference: [fractal, kijun, kumo_edge]
      kijun_buffer_pips: 5
      max_stop_pips: 100
      min_rr_ratio: 1.5

  sss:
    enabled: true
    weight: 1.0
    swing_lookback_n: 2
    min_swing_pips: 0.5
    ss_candle_min: 8
    iss_candle_min: 3
    iss_candle_max: 8
    max_bars_in_state: 100
    max_active_levels: 50
    require_cbc_context: false
    fifty_tap_level: 0.5
    fifty_tap_tolerance_pips: 0.5
    entry_mode: "cbc_only"      # cbc_only, fifty_tap, combined
    min_confluence_score: 2
    tier_a_plus: 7
    tier_b: 5
    warmup_bars: 50
    spread_multiplier: 2.0
    min_stop_pips: 10.0
    rr_ratio: 2.0

# Shared config (not strategy-specific)
risk:
  initial_risk_pct: 0.5    # % of account risked per trade in Phase 1 (0–+4%)
  reduced_risk_pct: 0.75   # % of account risked per trade in Phase 2 (>+4%)
  phase_threshold_pct: 4.0 # Account growth level that triggers phase switch
  daily_circuit_breaker_pct: 4.5  # Halt trading after 4.5% daily drawdown
  max_concurrent_positions: 3     # Allow all 3 strategies to hold concurrent positions
  max_lot_size: 1.0               # Hard cap on lot size per trade
  min_stop_spread_multiplier: 2.0 # Minimum stop distance = spread * this value

exit:
  strategy: hybrid_50_50          # Close 50% at TP; trail the remainder
  tp_r_multiple: 1.5              # Initial TP at 1.5 R (lowered: more achievable with wider stop)
  trail_type: kijun               # Trailing mechanism: kijun | fixed | atr
  breakeven_threshold_r: 1.0      # Move SL to BE once price reaches 1 R
  kijun_trail_start_r: 1.5        # Begin Kijun trail from 1.5 R
  higher_tf_kijun_start_r: 3.0   # Switch to higher-TF Kijun trail from 3 R

prop_firm:
  # TopstepX $50K Combine (dollar-based trailing MLL)
  # The style discriminator is read by the pydantic PropFirmConfig
  # union to pick the concrete schema at load time.
  style: topstep_combine_dollar
  name: topstep_50k_combine
  account_size: 50000
  profit_target_usd: 3000
  max_loss_limit_usd_trailing: 2000
  daily_loss_limit_usd: 1000
  consistency_pct: 50.0
  max_micro_contracts: 50
  max_full_contracts: 5
  daily_reset_tz: "America/Chicago"
  daily_reset_hour: 17

# Legacy the5ers 2-step High Stakes Classic config — kept for reference.
# To switch back: uncomment this block (and comment the topstep block above)
# OR copy these values into a the5ers-specific strategy.yaml via CONFIG_DIR.
# prop_firm:
#   style: the5ers_pct_phased
#   name: the5ers_2step_high_stakes
#   account_size: 10000
#   leverage: 100
#   phase_1:
#     profit_target_pct: 8.0
#     max_loss_pct: 10.0
#     daily_loss_pct: 5.0
#     time_limit_days: 0
#   phase_2:
#     profit_target_pct: 5.0
#     max_loss_pct: 10.0
#     daily_loss_pct: 5.0
#     time_limit_days: 0
#   funded:
#     monthly_target_pct: 10.0
#     max_loss_pct: 10.0
#     daily_loss_pct: 5.0

# ------------------------------------------------------------------
# Strategy selector — two different fields read by two code paths:
#   * active_strategy  (singular): legacy field read by
#     src/strategy/loader.py for live mode. Leave as "ichimoku" so
#     the live engine defaults to the original behavior.
#   * active_strategies (plural): read by the multi-strategy
#     dispatcher in src/backtesting/vectorbt_engine.py. Lists every
#     strategy the backtest should blend.
# ------------------------------------------------------------------
active_strategies:
  - ichimoku
  - asian_breakout
  - ema_pullback
  - sss
