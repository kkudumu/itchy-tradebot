# Futures profile defaults.
# Applied to every instrument with class: futures in instruments.yaml.
# Per-instrument values override these.

instrument_class: futures

# Cost model — round-trip commission per contract, slippage in ticks
default_commission_per_contract_round_trip: 1.40
default_slippage_ticks: 1

# Daily reset at 5pm America/Chicago matches TopstepX and CME conventions
daily_reset_hour: 17
daily_reset_tz: "America/Chicago"

# Futures regular trading session window (CME electronic hours)
session_open_local: "17:00"
session_close_local: "16:00"
# CME has a 1h maintenance break each day at 16:00 CT
maintenance_window_minutes: 60

# ---------------------------------------------------------------------------
# Strategy overrides for MGC futures
#
# These are merged ON TOP of strategy.yaml's base values when the active
# instrument has class: futures. The base strategy.yaml carries the forex/
# XAU spot defaults; these overrides adapt them for MGC's price scale,
# volatility profile, and session dynamics WITHOUT touching the forex path.
#
# Rationale per strategy:
#   * ichimoku: relax confluence threshold (the existing signal engine was
#     tuned on multi-year forex history; MGC has only ~2 months of data so
#     strict confluence kills too many signals)
#   * asian_breakout: widen range window (MGC at ~$5000 has much wider
#     intraday ranges in absolute terms than forex spot at ~$2000; pip_value
#     already handles the unit conversion but min/max_range_pips need
#     rescaling to the futures price level)
#   * ema_pullback: relax angle thresholds (MGC's larger price scale means
#     EMA angles are naturally smaller in degrees)
#   * sss: keep pip thresholds (the pip_value=0.1 convention in the strategy
#     already maps 1:1 between XAU spot and MGC ticks), relax confluence,
#     wider min_stop for futures commissions
# ---------------------------------------------------------------------------
strategy_overrides:
  ichimoku:
    signal:
      min_confluence_score: 0
      tier_c: 0
    atr:
      stop_multiplier: 3.0
  asian_breakout:
    min_range_pips: 2
    max_range_pips: 300
    pip_value: 0.1
    rr_ratio: 1.5
  ema_pullback:
    min_ema_angle_deg: 0.5
    max_ema_angle_deg: 95
    rr_ratio: 1.5
  sss:
    swing_lookback_n: 5
    min_swing_pips: 3.0
    ss_candle_min: 9
    iss_candle_min: 5
    iss_candle_max: 7
    entry_mode: cbc_only
    min_confluence_score: 3
    min_stop_pips: 15.0
    warmup_bars: 30
    rr_ratio: 1.5
    spread_multiplier: 3.0
  fx_at_one_glance:
    # MGC's recent 5M tape is much quieter than the original forex/XAU
    # course examples. The default FXAOG hard gates (five elements +
    # range filter + tier B / score 6) collapse signal frequency to near
    # zero on the futures feed, so use a looser profile by default.
    five_elements_mode: disabled
    signal_cooldown_bars: 12
    reentry_price_tolerance_points: 5.0
    reentry_stop_tolerance_points: 2.0
    range_filter:
      adx_min: 0
      cloud_thickness_min_usd: 0.0
    signal:
      min_confluence_score: 2
      min_tier: C
