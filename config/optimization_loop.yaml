optimization:
  max_iterations: 10
  target_sharpe: 1.0
  max_changes_per_iteration: 2
  optimization_years: 2
  plateau_threshold: 0.05  # 5% improvement minimum
  plateau_iterations: 3    # number of stale iterations before stopping

persistence:
  enabled: true
  reports_dir: "reports"

claude:
  command: ["claude", "-p", "--dangerously-skip-permissions"]
  timeout_seconds: 300

validation:
  run_full_dataset: true
