optimization:
  max_iterations: 10
  target_pass_rate: 0.50
  rolling_window_spacing_days: 22
  max_changes_per_iteration: 2
  plateau_threshold: 0.05
  plateau_iterations: 3
  optimization_years: 0.5        # ~6 months = ~90K 1M bars for fast iteration
  # Objective function used to score each trial. Options:
  #   pass_rate                  — legacy: the5ers rolling/MC pct pass rate
  #   topstep_combine_pass_score — TopstepX dollar-based pass/fail verdict
  # The loop auto-detects the active prop_firm.style from strategy.yaml
  # and overrides this default when they don't match.
  objective: pass_rate

persistence:
  enabled: true
  reports_dir: "reports"

claude:
  command: ["claude", "-p", "--dangerously-skip-permissions"]
  timeout_seconds: 600
  encoding: utf-8

validation:
  run_full_dataset: true

strategies:
  sss:
    n_trials: 300
    search_space: conservative   # 7 params, ~2000 combinations
    walk_forward:
      in_sample_months: 12
      out_of_sample_months: 3
